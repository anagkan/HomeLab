services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    
    restart: unless-stopped
    
    networks:
      - proxy

    environment:
      - WEBHOOK_URL=https://n8n.${DOMAIN}
      - N8N_HOST=n8n.${DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_DIAGNOSTICS_ENABLED=false

    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files

    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=${CERTRESOLVER}"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n.tls.domains[0].main=${DOMAIN}"
      - "traefik.http.routers.n8n.tls.domains[0].sans=*.${DOMAIN}"

      - "traefik.http.routers.n8n.priority=1"

      # Authelia middleware
      - "traefik.http.routers.n8n.middlewares=authelia@docker"

      # Webhook router - bypasses Authelia so Telegram/external calls can hit webhooks
      - "traefik.http.routers.n8n-webhooks.rule=Host(`n8n.${DOMAIN}`) && (PathPrefix(`/webhook`) || PathPrefix(`/webhook-test`))"
      - "traefik.http.routers.n8n-webhooks.entrypoints=websecure"
      - "traefik.http.routers.n8n-webhooks.tls=true"
      - "traefik.http.routers.n8n-webhooks.service=n8n"
      - "traefik.http.routers.n8n-webhooks.priority=100"

volumes:
  n8n_data:

networks:
  proxy:
    external: true

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: false
  debug: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy
  file:                                                                                                                                                                                                                                                        
    directory: /config                                                                                                                                                                                                                                         
    watch: true

certificatesResolvers:
  ${CERTRESOLVER}:
    acme:
      email: ${ACME_EMAIL}
      storage: /acme.json
      dnsChallenge:                                                                                                                                                                                                                                            
        provider: ${CERTRESOLVER}
        delayBeforeCheck: 60s                                                                                                                                                                                                                                   
        resolvers:                                                                                                                                                             
          - "1.1.1.1:53"                                                                                                                                                                                                                                       
          - "8.8.8.8:53"

log:
  level: INFO
  filePath: "/logs/traefik.log"

accessLog:
  filePath: "/logs/access.log"
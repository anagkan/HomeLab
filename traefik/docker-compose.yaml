services:                                                                                                                                                                                                                                                      
    traefik:
      image: traefik:v3.6
      container_name: traefik
      
      restart: unless-stopped
      
      security_opt:
        - no-new-privileges:true
      
      ports:
        - "80:80"
        - "443:443"                                                                                                                                                                                                                                              
      
      environment:                                                                                                                                                                                                                                               
        - PORKBUN_API_KEY=${DOMAIN_REGISTRAR_API_KEY}                                                                                                                                                                                                                     
        - PORKBUN_SECRET_API_KEY=${DOMAIN_REGISTRAR_SECRET_API_KEY}                                                                                                                                                                                                       
      
      volumes:                                                                                                                                                                                                                                                   
        - /etc/localtime:/etc/localtime:ro                                                                                                                                                                                                                       
        - /var/run/docker.sock:/var/run/docker.sock:ro                                                                                                                                                                                                           
        - ./traefik.yaml:/traefik.yaml:ro                                                                                                                                                                                                                          
        - ./acme.json:/acme.json                                                                                                                                                                                                                                 
        - ./config:/config:ro
        - ./logs:/logs
      
      networks:                                                                                                                                                                                                                                                  
        - proxy                                                                                                                                                                                                                                                  
      
      labels:                                                                                                                                                                                                                                                    
        - "traefik.enable=true"                                                                                                                                                                                                                                  
        - "traefik.docker.network=proxy"
        - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"                                                                                                                                                                                             
        - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"                                                                                                                                                                            
        - "traefik.http.routers.traefik-dashboard.tls=true"                                                                                                                                                                                                      
        - "traefik.http.routers.traefik-dashboard.tls.certresolver=${CERTRESOLVER}"                                                                                                                                                                                      
        - "traefik.http.routers.traefik-dashboard.tls.domains[0].main=${DOMAIN}"                                                                                                                                                                             
        - "traefik.http.routers.traefik-dashboard.tls.domains[0].sans=*.${DOMAIN}"                                                                                                                                                                           
        - "traefik.http.routers.traefik-dashboard.service=api@internal"  

        # Authelia middleware
        - "traefik.http.routers.traefik-dashboard.middlewares=authelia@docker"                                                                                                                                                                                   
                                                                                                                                                                                                                                                                 
networks:                                                                                                                                                                                                                                                      
    proxy:                                                                                                                                                                                                                                                       
      external: true

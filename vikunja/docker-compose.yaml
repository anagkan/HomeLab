services:
    vikunja:
      image: vikunja/vikunja
      container_name: vikunja
      restart: unless-stopped

      environment:
        VIKUNJA_SERVICE_PUBLICURL: https://vikunja.${DOMAIN}
        VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_JWT_SECRET}
        VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"  # Set to "false" after creating your account
        VIKUNJA_DATABASE_TYPE: sqlite
        VIKUNJA_DATABASE_PATH: /app/vikunja/files/vikunja.db
      
      volumes:
        - ./files:/app/vikunja/files
      
      networks:
        - proxy
      
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.vikunja.rule=Host(`vikunja.${DOMAIN}`)"
        - "traefik.http.routers.vikunja.entrypoints=websecure"
        - "traefik.http.routers.vikunja.tls=true"
        - "traefik.http.routers.vikunja.tls.certresolver=${CERTRESOLVER}"
        - "traefik.http.services.vikunja.loadbalancer.server.port=3456"
        - "traefik.http.routers.vikunja.tls.domains[0].main=${DOMAIN}"                                                                                         
        - "traefik.http.routers.vikunja.tls.domains[0].sans=*.${DOMAIN}"

        # Authelia middleware
        - "traefik.http.routers.vikunja.middlewares=authelia@docker"


networks:
    proxy:
        external: true

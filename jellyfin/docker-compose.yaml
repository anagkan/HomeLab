services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin

    restart: unless-stopped

    networks:
      - proxy

    environment:
      - TZ=America/New_York

    volumes:
      - ./config:/config
      - ./cache:/cache
      - ./media:/media

    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=${CERTRESOLVER}"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.http.routers.jellyfin.tls.domains[0].main=${DOMAIN}"
      - "traefik.http.routers.jellyfin.tls.domains[0].sans=*.${DOMAIN}"

      # Authelia middleware
      - "traefik.http.routers.jellyfin.middlewares=authelia@docker"

networks:
  proxy:
    external: true

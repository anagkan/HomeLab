services:
  pairdrop:
    image: "lscr.io/linuxserver/pairdrop:latest"
    container_name: pairdrop
    restart: unless-stopped
    environment:
      - PUID=1000 # UID to run the application as
      - PGID=1000 # GID to run the application as
      - WS_FALLBACK=true # Set to true to enable websocket fallback if the peer to peer WebRTC connection is not available to the client.
      - RATE_LIMIT=false # Set to true to limit clients to 1000 requests per 5 min.
      - DEBUG_MODE=false # Set to true to debug container and peer connections.
      - TZ=America/New_York  # Time Zone
    networks:
      - proxy
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.pairdrop.rule=Host(`pairdrop.${DOMAIN}`)"
      - "traefik.http.routers.pairdrop.entrypoints=websecure"
      - "traefik.http.routers.pairdrop.tls=true"
      - "traefik.http.routers.pairdrop.tls.certresolver=${CERTRESOLVER}"
      - "traefik.http.services.pairdrop.loadbalancer.server.port=3000"
      - "traefik.http.routers.pairdrop.tls.domains[0].main=${DOMAIN}"                                                                                         
      - "traefik.http.routers.pairdrop.tls.domains[0].sans=*.${DOMAIN}"
      
      # Authelia middleware
      - "traefik.http.routers.pairdrop.middlewares=authelia@docker"


    #ports:
      #- "3001:3000" # Web UI. Change the port number before the last colon e.g. `127.0.0.1:9000:3000`

networks:                                                                                                                                                                                                                                                    
    proxy:                                                                                                                                                                                                                                                     
      external: true